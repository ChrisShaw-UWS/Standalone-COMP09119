services:
  flask-app:
    build:
      context: flask-app
      dockerfile: Dockerfile
    image: uwschriss/assignment_1_flask_app:latest
    # Note: We removed the 'ports' section here.
    # The app is now only accessible via Nginx.

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - flask-app



  